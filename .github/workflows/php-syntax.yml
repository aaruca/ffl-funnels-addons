name: PHP syntax

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PHP syntax
        run: |
          set -e
          find . -name '*.php' ! -path './.git/*' ! -path './vendor/*' -print0 | xargs -0 -n1 php -l
