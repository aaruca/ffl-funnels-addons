name: Build Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p /tmp/ffl-funnels-addons
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='test_dir' \
            --exclude='generate_rules.py' \
            --exclude='woobooster-rules-import.json' \
            --exclude='*.log' \
            ./ /tmp/ffl-funnels-addons/
          cd /tmp
          zip -r ffl-funnels-addons-${{ github.event.release.tag_name }}.zip ffl-funnels-addons/

      - name: Upload ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            /tmp/ffl-funnels-addons-${{ github.event.release.tag_name }}.zip \
            --repo ${{ github.repository }} \
            --clobber
